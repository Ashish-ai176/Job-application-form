<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Form</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>Job Application Form</h1>
    <p class="subtitle">Please fill in your details to apply for the position.</p>

    <form>
      <h2>Personal Information</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="Enter your first name" required>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Enter your last name" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="example@email.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob">
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" placeholder="Enter your city">
        </div>
      </div>

      <h2>Job Details</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="position">Position Applying For</label>
          <select id="position" required>
            <option value="">Select a position</option>
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>Web Developer</option>
            <option>UI/UX Designer</option>
            <option>Data Analyst</option>
            <option>Software Intern</option>
          </select>
        </div>

        <div class="form-group">
          <label for="experience">Work Experience</label>
          <select id="experience">
            <option value="">Select experience</option>
            <option>Fresher</option>
            <option>0 - 1 Year</option>
            <option>1 - 3 Years</option>
            <option>3 - 5 Years</option>
            <option>More than 5 Years</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Employment Type Preferred</label>

        <div class="radio-group">
          <label><input type="radio" name="employment"> Full Time</label>
          <label><input type="radio" name="employment"> Part Time</label>
          <label><input type="radio" name="employment"> Internship</label>
          <label><input type="radio" name="employment"> Remote</label>
        </div>
      </div>

      <h2>Education and Skills</h2>

      <div class="form-row">
        <div class="form-group">
          <label for="qualification">Highest Qualification</label>
          <select id="qualification">
            <option value="">Select qualification</option>
            <option>High School</option>
            <option>Diploma</option>
            <option>Bachelor's Degree</option>
            <option>Master's Degree</option>
          </select>
        </div>

        <div class="form-group">
          <label for="college">College / University</label>
          <input type="text" id="college" placeholder="Enter college name">
        </div>
      </div>

      <div class="form-group">
        <label>Skills</label>

        <div class="checkbox-group">
          <label><input type="checkbox"> HTML</label>
          <label><input type="checkbox"> CSS</label>
          <label><input type="checkbox"> JavaScript</label>
          <label><input type="checkbox"> React</label>
          <label><input type="checkbox"> Python</label>
          <label><input type="checkbox"> Java</label>
        </div>
      </div>

      <h2>Additional Information</h2>

      <div class="form-group">
        <label for="resume">Upload Resume</label>
        <input type="file" id="resume" accept=".pdf,.doc,.docx">
      </div>

      <div class="form-group message-box">
        <label for="message">Why should we hire you?</label>
        <textarea id="message" placeholder="Write a short introduction about yourself..."></textarea>
      </div>

      <div class="checkbox-group declaration">
        <label>
          <input type="checkbox" required>
          I confirm that the information provided is correct.
        </label>
      </div>

      <button type="submit" class="submit-btn">Submit Application</button>

      <p class="note">
        This is a front-end job application form made using HTML and CSS.
      </p>
    </form>
  </div>
</body>
</html>
